services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
      # Optional: reach Ollama from the host while debugging
      # - "11434:11434"
    # Ollama runs inside this image; OLLAMA_HOST is set in the Dockerfile.
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
